<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ── -->
    <title>
      Funding Connect Consulting | First Nations Funding Specialists
    </title>
    <meta
      name="description"
      content="Funding Connect Consulting connects Aboriginal and Torres Strait Islander organisations with funding opportunities and supports program design across Australia."
    />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fundingconnect.com.au/" />
    <meta
      property="og:title"
      content="Funding Connect Consulting | First Nations Funding Specialists"
    />
    <meta
      property="og:description"
      content="Connecting Aboriginal and Torres Strait Islander organisations with funding opportunities and supporting program design across Australia."
    />
    <meta
      property="og:image"
      content="https://fundingconnect.com.au/assets/images/og-image.png"
    />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Funding Connect Consulting" />
    <meta
      name="twitter:description"
      content="First Nations funding specialists — grant writing, program design &amp; capacity building."
    />
    <meta
      name="twitter:image"
      content="https://fundingconnect.com.au/assets/images/og-image.png"
    />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      href="assets/icons/favicon.png"
      sizes="32x32"
    />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Mulish:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ── Styles ── -->
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="components/welcome-popup.css" />
  </head>
  <body>
    <!-- ════════════════════════════════
         NAVBAR (injected by components/navbar.js)
    ════════════════════════════════ -->
    <div id="navbar-placeholder"></div>

    <!-- ════════════════════════════════
         MAIN CONTENT
    ════════════════════════════════ -->
    <main id="main-content">
      <!-- ══ PAGE: HOME ══ -->
      <div id="page-home" class="page active" role="region" aria-label="Home">
        <div id="home-hero-placeholder"></div>

        <div id="grants-carousel-placeholder"></div>

        <div id="home-blurb-placeholder"></div>
      </div>
      <!-- /page-home -->

      <!-- ══ PAGE: ABOUT ══ -->
      <div id="page-about" class="page" role="region" aria-label="About">
        <div id="about-page-banner-placeholder"></div>

        <div class="about-body">
          <div class="about-intro">
            <div id="about-intro-placeholder"></div>

            <div id="values-placeholder"></div>
          </div>

          <div id="pillars-placeholder"></div>

          <div id="about-acknowledgement-placeholder"></div>
        </div>
      </div>
      <!-- /page-about -->

      <!-- ══ PAGE: SERVICES ══ -->
      <div id="page-services" class="page" role="region" aria-label="Services">
        <div id="services-page-banner-placeholder"></div>

        <div class="services-body">
          <div id="services-grid-placeholder"></div>

          <div id="process-steps-placeholder"></div>
        </div>
      </div>
      <!-- /page-services -->

      <!-- ══ PAGE: CONNECT ══ -->
      <div id="page-connect" class="page" role="region" aria-label="Connect">
        <div id="connect-page-banner-placeholder"></div>

        <div class="connect-body">
          <aside class="connect-left" aria-label="Contact information">
            <div id="connect-intro-placeholder"></div>

            <div id="contact-info-placeholder"></div>

            <div id="connect-acknowledgement-placeholder"></div>
          </aside>
          <div id="contact-forms-placeholder"></div>
        </div>
        <!-- /connect-body -->
      </div>
      <!-- /page-connect -->
    </main>

    <!-- ════════════════════════════════
         FOOTER (injected by components/footer.js)
    ════════════════════════════════ -->
    <div id="footer-placeholder"></div>

    <!-- ── Component helpers ── -->
    <script src="components/dom.js"></script>

    <!-- ── Site content/data ── -->
    <script src="data/site-content.js"></script>

    <!-- ── Layout components ── -->
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>

    <!-- ── Page section components ── -->
    <script src="components/page-banner.js"></script>
    <script src="components/home-hero.js"></script>
    <script src="components/grants-carousel.js"></script>
    <script src="components/home-blurb.js"></script>
    <script src="components/about-intro.js"></script>
    <script src="components/values.js"></script>
    <script src="components/pillars.js"></script>
    <script src="components/acknowledgement.js"></script>
    <script src="components/services-grid.js"></script>
    <script src="components/process-steps.js"></script>
    <script src="components/contact-info.js"></script>
    <script src="components/contact-sidebar.js"></script>
    <script src="components/contact-forms.js"></script>
    <script src="components/welcome-popup.js"></script>

    <!-- ── App behaviour scripts ── -->
    <script src="scripts/utils.js"></script>
    <script src="scripts/router.js"></script>
    <script src="scripts/tabs.js"></script>
    <script src="scripts/forms.js"></script>
    <script src="scripts/app.js"></script>
  </body>
</html>
