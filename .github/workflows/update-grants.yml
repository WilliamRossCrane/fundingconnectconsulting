name: Update Grants Data

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-grants:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Fetch latest grants
        run: npm run fetch:grants

      - name: Commit updated grants data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update grants data"
          file_pattern: data/grants.json
